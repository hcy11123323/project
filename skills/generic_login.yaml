id: generic_login
name: 通用登录流程
type: interaction
description: 通用的用户名密码登录流程，适配任何包含用户名、密码、提交按钮的登录页
version: "1.0.0"

triggers:
  - 登录
  - login
  - 登入
  - sign in

url_patterns: []

domain: null

parameters:
  url:
    type: string
    required: true
    description: 登录页 URL
  username:
    type: string
    required: true
    description: 用户名
  password:
    type: string
    required: true
    description: 密码
  username_selector:
    type: string
    required: false
    default: "input[name='username'], input[type='email'], #username"
    description: 用户名输入框选择器
  password_selector:
    type: string
    required: false
    default: "input[name='password'], input[type='password'], #password"
    description: 密码输入框选择器
  submit_selector:
    type: string
    required: false
    default: "button[type='submit'], input[type='submit']"
    description: 提交按钮选择器

steps:
  - action: goto
    args:
      url: "{{url}}"
    comment: 导航到登录页

  - action: fill
    target: "{{username_selector}}"
    value: "{{username}}"
    comment: 填写用户名
    on_error: stop

  - action: fill
    target: "{{password_selector}}"
    value: "{{password}}"
    comment: 填写密码
    on_error: stop

  - action: click
    target: "{{submit_selector}}"
    comment: 点击登录按钮
    on_error: stop

  - action: wait_for_navigation
    args:
      timeout: 15
    comment: 等待登录后跳转
