id: bing_search
name: Bing 搜索
type: domain
description: 在 Bing 搜索指定关键词
version: "1.0.0"

triggers:
  - bing
  - 必应
  - 搜索
  - search

url_patterns:
  - "*.bing.com"

domain: bing

parameters:
  keyword:
    type: string
    required: true
    description: 搜索关键词

steps:
  - action: goto
    args:
      url: "https://cn.bing.com"
    comment: 导航到 Bing 首页

  - action: smart_fill
    target: search_input
    value: "{{keyword}}"
    comment: 输入搜索关键词

  - action: smart_click
    target: search_button
    comment: 点击搜索按钮

  - action: wait_for_navigation
    args:
      timeout: 10
    comment: 等待搜索结果页加载
