id: google_search
name: Google 搜索
type: domain
description: 在 Google 搜索指定关键词
version: "1.0.0"

triggers:
  - google
  - 谷歌
  - 搜索
  - search

url_patterns:
  - "*.google.com"

domain: google

parameters:
  keyword:
    type: string
    required: true
    description: 搜索关键词

steps:
  - action: goto
    args:
      url: "https://www.google.com"
    comment: 导航到 Google 首页

  - action: smart_fill
    target: search_input
    value: "{{keyword}}"
    comment: 输入搜索关键词

  - action: smart_click
    target: search_button
    comment: 点击搜索按钮

  - action: wait_for_navigation
    args:
      timeout: 10
    comment: 等待搜索结果页加载
